name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --add-data "assets;assets" --hidden-import primer3 --hidden-import primer3.bindings --collect-all primer3 main.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          name: GRACE v1.0.0 (Windows x64)
